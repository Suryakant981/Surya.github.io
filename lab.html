<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surya | Experimental Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050508; color: #00ffcc; font-family: 'Share Tech Mono', monospace; }

        #terminal-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; text-shadow: 0 0 10px #00ffcc; font-size: 1.2rem; transition: opacity 1s ease-in-out; }
        .term-line { opacity: 0; margin-bottom: 10px; }
        .typing { border-right: 2px solid #00ffcc; animation: blink-cursor 0.8s infinite; white-space: nowrap; overflow: hidden; width: 0; }
        @keyframes blink-cursor { 50% { border-color: transparent; } }

        .overlay-ui { position: absolute; z-index: 10; top: 30px; left: 30px; pointer-events: none; }
        .overlay-ui h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; margin: 0; color: #fff; text-shadow: 0 0 20px #8a2be2, 0 0 40px #8a2be2; }
        .overlay-ui p { color: #b3b3b3; font-size: 1.1rem; }

        .back-btn { position: absolute; top: 30px; right: 30px; z-index: 20; color: #00ffcc; text-decoration: none; font-family: 'Orbitron', sans-serif; border: 1px solid #00ffcc; padding: 10px 20px; border-radius: 5px; transition: 0.3s; background: rgba(0,0,0,0.5); }
        .back-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }

        #voice-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 20; background: #050508; border: 2px solid #00ffcc; color: #00ffcc; padding: 15px 40px; font-size: 1.2rem; font-family: 'Orbitron', sans-serif; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px; pointer-events: auto; }
        #voice-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 40px rgba(0, 255, 204, 0.8); }
        #voice-btn.listening { border-color: #ff0055; color: #ff0055; box-shadow: 0 0 40px rgba(255, 0, 85, 0.8); animation: pulse-btn 1.5s infinite; }
        @keyframes pulse-btn { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } 100% { transform: translateX(-50%) scale(1); } }

        #ai-response { position: absolute; bottom: 110px; width: 100%; text-align: center; font-size: 1.5rem; color: #fff; text-shadow: 0 0 15px #e94560; z-index: 20; font-family: 'Orbitron', sans-serif; pointer-events: none; padding: 0 20px; box-sizing: border-box; }

        #physics-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        /* =========================================
           CSS STYLIZED AVATAR (AI.PNG THEME)
           ========================================= */
        #avatar-container {
            position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%);
            z-index: 15; display: flex; flex-direction: column; align-items: center;
            pointer-events: none; animation: float 4s ease-in-out infinite;
        }

        /* Hair Background */
        .hair-back {
            position: absolute; top: -15px; width: 160px; height: 210px;
            background: #27140c; /* Dark brown hair */
            border-radius: 45% 45% 20% 20%; z-index: 1;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        /* Face Base */
        .face {
            width: 120px; height: 145px; 
            background: linear-gradient(135deg, #fceddf 0%, #efc2a3 100%); /* Fair skin tone */
            border-radius: 40% 40% 55% 55%; position: relative; z-index: 2;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: inset 0 -10px 15px rgba(200, 140, 110, 0.4);
        }

        /* Bindi */
        .bindi { width: 5px; height: 5px; background: #222; border-radius: 50%; margin-top: 35px; }

        /* Eyes */
        .eyes-container { display: flex; gap: 25px; margin-top: 8px; }
        .eye { 
            width: 28px; height: 16px; background: #fff; border-radius: 50%; 
            position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;
            animation: blink-eye 4s infinite; border: 1px solid #d4a383;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.2);
        }
        .pupil { width: 14px; height: 14px; background: #4a2810; border-radius: 50%; position: relative; }
        .pupil::after { content: ''; position: absolute; top: 2px; left: 2px; width: 4px; height: 4px; background: #fff; border-radius: 50%; }

        /* Blush */
        .blush-container { display: flex; gap: 50px; margin-top: 5px; width: 100%; justify-content: center; position: absolute; top: 75px;}
        .blush { width: 20px; height: 8px; background: rgba(255, 100, 100, 0.4); border-radius: 50%; filter: blur(3px); }

        /* Mouth (Lip Sync Target) */
        .mouth { 
            width: 25px; height: 4px; background: #a84b4b; border-radius: 10px; 
            margin-top: 25px; transition: height 0.05s ease, border-radius 0.05s ease; 
        }

        /* White Kurti / Dress */
        .dress {
            width: 170px; height: 70px; background: #fdfdfd; 
            border-radius: 40% 40% 10% 10%; position: relative; z-index: 1; margin-top: -15px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.2), inset 0 0 20px rgba(200,200,200,0.3);
            display: flex; justify-content: center;
            border-top: 1px solid #e0e0e0;
        }
        .dress-neck { width: 40px; height: 25px; background: #efc2a3; border-radius: 0 0 50% 50%; box-shadow: inset 0 8px 10px rgba(0,0,0,0.1); }

        /* Hologram Base below the character */
        .holo-base {
            position: absolute; bottom: -40px; width: 200px; height: 25px; border-radius: 50%;
            border: 1px solid rgba(0, 255, 204, 0.5); background: radial-gradient(circle, rgba(0,255,204,0.2) 0%, transparent 70%);
            box-shadow: 0 0 20px #00ffcc; transform: rotateX(75deg); animation: base-pulse 2s infinite alternate; z-index: 0;
        }

        /* Active Speaking Effects */
        #avatar-container.speaking .holo-base { border-color: #00ffcc; box-shadow: 0 0 40px #00ffcc, inset 0 0 40px #00ffcc; animation: rapid-pulse 0.3s infinite alternate;}
        #avatar-container.speaking { filter: drop-shadow(0 0 15px rgba(0, 255, 204, 0.5)); }

        @keyframes blink-eye { 0%, 95%, 98%, 100% { height: 16px; margin-top: 0; } 96%, 99% { height: 2px; margin-top: 7px; } }
        @keyframes float { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-10px); } }
        @keyframes base-pulse { 0% { transform: rotateX(75deg) scale(0.9); opacity: 0.5; } 100% { transform: rotateX(75deg) scale(1.1); opacity: 1; } }
        @keyframes rapid-pulse { 0% { transform: rotateX(75deg) scale(1); opacity: 0.7;} 100% { transform: rotateX(75deg) scale(1.15); opacity: 1;} }
    </style>
</head>
<body>

    <div id="terminal-screen"></div>

    <div class="overlay-ui">
        <h1>SURYA LABS</h1>
        <p>Gravity Engine Active. Drag and drop the glowing blocks.</p>
    </div>
    
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Exit Lab</a>

    <div id="avatar-container">
        <div class="hair-back"></div>
        <div class="face">
            <div class="bindi"></div>
            <div class="eyes-container">
                <div class="eye left-eye"><div class="pupil"></div></div>
                <div class="eye right-eye"><div class="pupil"></div></div>
            </div>
            <div class="blush-container">
                <div class="blush"></div>
                <div class="blush"></div>
            </div>
            <div class="mouth" id="cyber-mouth"></div>
        </div>
        <div class="dress"><div class="dress-neck"></div></div>
        <div class="holo-base"></div>
    </div>

    <div id="ai-response"></div>
    <button id="voice-btn"><i class="fas fa-microphone"></i> Activate AI</button>

    <div id="physics-canvas"></div>
    
    <script>
        // 1. BOOTUP SCRIPT
        const terminal = document.getElementById('terminal-screen');
        const lines = [
            "Initiating SENTINEL-X secure protocols...",
            "Compiling Character CSS Vectors... [OK]",
            "Booting Matter.js 2D Physics... [OK]",
            "Initializing Neural Voice Uplink... [OK]",
            "Welcome back, Suryakant. System is fully operational."
        ];

        async function typeLines() {
            for (let i = 0; i < lines.length; i++) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'term-line typing';
                terminal.appendChild(lineDiv);
                lineDiv.style.opacity = 1;
                await typeText(lineDiv, lines[i], 30);
                lineDiv.classList.remove('typing');
                lineDiv.style.borderRight = "none";
                await new Promise(r => setTimeout(r, 300));
            }
            setTimeout(() => { terminal.style.opacity = 0; setTimeout(() => terminal.style.display = 'none', 800); }, 800);
        }

        function typeText(element, text, speed) {
            return new Promise(resolve => {
                let i = 0; element.textContent = "";
                const timer = setInterval(() => {
                    if (i < text.length) { element.textContent += text.charAt(i); i++; } 
                    else { clearInterval(timer); resolve(); }
                }, speed);
            });
        }
        window.onload = typeLines;

        // 2. PHYSICS ENGINE
        const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner,
              MouseConstraint = Matter.MouseConstraint, Mouse = Matter.Mouse, World = Matter.World, Bodies = Matter.Bodies;
        const engine = Engine.create(); const world = engine.world; world.gravity.y = 1;

        const render = Render.create({
            element: document.getElementById('physics-canvas'), engine: engine,
            options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
        });
        Render.run(render); Runner.run(Runner.create(), engine);

        const wallOptions = { isStatic: true, render: { fillStyle: 'rgba(0, 255, 204, 0.2)' } };
        World.add(world, [
            Bodies.rectangle(window.innerWidth/2, window.innerHeight + 25, window.innerWidth, 50, wallOptions),
            Bodies.rectangle(-25, window.innerHeight/2, 50, window.innerHeight, wallOptions),
            Bodies.rectangle(window.innerWidth + 25, window.innerHeight/2, 50, window.innerHeight, wallOptions)
        ]);

        for (let i = 0; i < 20; i++) {
            World.add(world, Bodies.rectangle(Math.random() * window.innerWidth, Math.random() * -500, Math.random() * 40 + 30, Math.random() * 40 + 30, 
                { restitution: 0.9, render: { fillStyle: i % 2 === 0 ? '#00ffcc' : '#e94560' } }
            ));
        }

        const mouse = Mouse.create(document.body);
        const mouseConstraint = MouseConstraint.create(engine, { mouse: mouse, constraint: { stiffness: 0.2, render: { visible: false } } });
        World.add(world, mouseConstraint); render.mouse = mouse;

        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth; render.canvas.height = window.innerHeight;
            Matter.Body.setPosition(world.bodies[0], { x: window.innerWidth / 2, y: window.innerHeight + 25 });
        });

        // 3. AVATAR LIP SYNC ENGINE
        let isSpeaking = false;
        const cyberMouth = document.getElementById('cyber-mouth');
        const avatarContainer = document.getElementById('avatar-container');

        function startLipSync() {
            isSpeaking = true;
            avatarContainer.classList.add('speaking');
            simulateLipSync();
        }
        
        function stopLipSync() {
            isSpeaking = false;
            avatarContainer.classList.remove('speaking');
            if(cyberMouth) {
                cyberMouth.style.height = '4px';
                cyberMouth.style.borderRadius = '10px';
                cyberMouth.style.width = '25px';
            }
        }

        function simulateLipSync() {
            if (!isSpeaking) return;
            const isOpen = Math.random() > 0.4;
            if (isOpen && cyberMouth) {
                const height = Math.floor(Math.random() * 15) + 5; 
                const width = Math.floor(Math.random() * 10) + 20; 
                cyberMouth.style.height = `${height}px`;
                cyberMouth.style.width = `${width}px`;
                cyberMouth.style.borderRadius = '50%'; 
            } else if (cyberMouth) {
                cyberMouth.style.height = '4px';
                cyberMouth.style.width = '25px';
                cyberMouth.style.borderRadius = '10px';
            }
            setTimeout(() => { requestAnimationFrame(simulateLipSync); }, 80); 
        }

        // 4. GROQ API (LLAMA-3.1 BRAIN)
        const lab_p1 = "gs"+"k_fDI4ghUMTl91vtQfC"; const lab_p2 = "3MWWGdyb3FYkktAtJlSX"; const lab_p3 = "bOLYWaKWIEnoAhY";
        const LAB_AI_KEY = lab_p1 + lab_p2 + lab_p3;

        let labHistory = [{ role: "system", content: `You are Surya Labs AI, a highly intelligent assistant created by Suryakant. [CRITICAL DIRECTIVE]: If user speaks English -> REPLY IN ENGLISH. If Hindi/Hinglish -> REPLY IN ROMAN HINGLISH using female grammar ("Main kar rahi hu"). Call him "Suryakant" or "Boss". Keep it under 2 sentences.` }];

        async function fetchDynamicAI(userQuestion) {
            labHistory.push({ role: "user", content: userQuestion });
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${LAB_AI_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: labHistory, temperature: 0.6, max_tokens: 100 })
                });
                const data = await response.json();
                if (data.choices && data.choices.length > 0) {
                    const aiReply = data.choices[0].message.content;
                    labHistory.push({ role: "assistant", content: aiReply });
                    return aiReply;
                } return "Brain disconnected.";
            } catch (error) { return "Network Error."; }
        }

        // 5. ELEVENLABS NATURAL VOICE
        const el_p1 = "sk_30c24e569c81d"; const el_p2 = "da0ef80bac0eeafbf67"; const el_p3 = "caf94b2b8059eeb0";
        const ELEVENLABS_API_KEY = el_p1 + el_p2 + el_p3;
        const VOICE_ID = "EXAVITQu4vr4xnSDxMaL"; 

        async function speak(text) {
            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}?optimize_streaming_latency=1`, {
                    method: 'POST', headers: { 'xi-api-key': ELEVENLABS_API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, model_id: "eleven_multilingual_v2", voice_settings: { stability: 0.35, similarity_boost: 0.85 } })
                });
                if (response.ok) {
                    const audio = new Audio(URL.createObjectURL(await response.blob()));
                    audio.onplay = () => { startLipSync(); };
                    audio.onended = () => { stopLipSync(); };
                    audio.play();
                } else fallbackSpeak(text);
            } catch (error) { fallbackSpeak(text); }
        }
        
        function fallbackSpeak(text) {
            const synth = window.speechSynthesis; const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 1.0; utterance.rate = 1.0;  
            let bestVoice = synth.getVoices().find(v => v.name.includes("Google") || v.lang.includes("en-IN") || v.lang.includes("hi-IN"));
            if (bestVoice) utterance.voice = bestVoice;
            utterance.onstart = () => { startLipSync(); };
            utterance.onend = () => { stopLipSync(); };
            synth.speak(utterance);
        }

        // 6. VOICE RECOGNITION
        const voiceBtn = document.getElementById('voice-btn');
        const aiResponseText = document.getElementById('ai-response');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false; recognition.lang = 'en-IN'; 

            voiceBtn.addEventListener('click', () => {
                recognition.start(); voiceBtn.classList.add('listening');
                voiceBtn.innerHTML = '<i class="fas fa-satellite-dish"></i> Listening...';
                aiResponseText.innerText = "Listening...";
            });

            recognition.onresult = async (event) => {
                const userSpeech = event.results[0][0].transcript.toLowerCase();
                voiceBtn.classList.remove('listening');
                voiceBtn.innerHTML = '<i class="fas fa-microphone"></i> Activate AI';
                aiResponseText.innerText = `You: "${userSpeech}"`;

                if(userSpeech.includes("zero gravity") || userSpeech.includes("float")) {
                    world.gravity.y = 0; world.bodies.forEach(b => !b.isStatic && Matter.Body.applyForce(b, b.position, {x: 0, y: -0.05}));
                    let reply = "Zero gravity engaged.";
                    setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 1000); return;
                } else if(userSpeech.includes("normal gravity") || userSpeech.includes("restore")) {
                    world.gravity.y = 1; let reply = "Normal gravity restored.";
                    setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 1000); return;
                }

                const reply = await fetchDynamicAI(userSpeech);
                setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 500);
            };

            recognition.onerror = () => {
                voiceBtn.classList.remove('listening'); voiceBtn.innerHTML = '<i class="fas fa-microphone"></i> Activate AI';
                aiResponseText.innerText = "Error reading voice. Check permissions.";
            };
        }
    </script>
</body>
</html>
