<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surya | Experimental Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/5.3.3/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/dcatvg/PixiJS-Live2D@master/live2d.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/index.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050508; color: #00ffcc; font-family: 'Share Tech Mono', monospace; }

        #terminal-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; text-shadow: 0 0 10px #00ffcc; font-size: 1.2rem; transition: opacity 1s ease-in-out; }
        .term-line { opacity: 0; margin-bottom: 10px; }
        .typing { border-right: 2px solid #00ffcc; animation: blink 0.8s infinite; white-space: nowrap; overflow: hidden; width: 0; }
        @keyframes blink { 50% { border-color: transparent; } }

        .overlay-ui { position: absolute; z-index: 10; top: 30px; left: 30px; pointer-events: none; }
        .overlay-ui h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; margin: 0; color: #fff; text-shadow: 0 0 20px #8a2be2, 0 0 40px #8a2be2; }
        .overlay-ui p { color: #b3b3b3; font-size: 1.1rem; }

        .back-btn { position: absolute; top: 30px; right: 30px; z-index: 20; color: #00ffcc; text-decoration: none; font-family: 'Orbitron', sans-serif; border: 1px solid #00ffcc; padding: 10px 20px; border-radius: 5px; transition: 0.3s; background: rgba(0,0,0,0.5); }
        .back-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }

        #voice-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 20; background: #050508; border: 2px solid #00ffcc; color: #00ffcc; padding: 15px 40px; font-size: 1.2rem; font-family: 'Orbitron', sans-serif; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px; pointer-events: auto; }
        #voice-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 40px rgba(0, 255, 204, 0.8); }
        #voice-btn.listening { border-color: #ff0055; color: #ff0055; box-shadow: 0 0 40px rgba(255, 0, 85, 0.8); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } 100% { transform: translateX(-50%) scale(1); } }

        #ai-response { position: absolute; bottom: 110px; width: 100%; text-align: center; font-size: 1.5rem; color: #fff; text-shadow: 0 0 15px #e94560; z-index: 20; font-family: 'Orbitron', sans-serif; pointer-events: none; padding: 0 20px; box-sizing: border-box; }

        /* LIVE2D AVATAR CANVAS */
        #live2d-canvas {
            position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%);
            z-index: 15; pointer-events: none; filter: drop-shadow(0 0 20px rgba(0, 255, 204, 0.3));
        }

        #physics-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
    </style>
</head>
<body>

    <div id="terminal-screen"></div>

    <div class="overlay-ui">
        <h1>SURYA LABS</h1>
        <p>Gravity Engine Active. Drag and drop the glowing blocks.</p>
    </div>
    
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Exit Lab</a>

    <canvas id="live2d-canvas"></canvas>
    <div id="ai-response"></div>
    <button id="voice-btn"><i class="fas fa-microphone"></i> Activate AI</button>

    <div id="physics-canvas"></div>
    
    <script>
        // 1. TERMINAL BOOTUP
        const terminal = document.getElementById('terminal-screen');
        const lines = [
            "Initiating SENTINEL-X protocols...",
            "Loading Brute-Force Path Scanner...",
            "Booting Physics Engine...",
            "System is ready."
        ];

        async function typeLines() {
            for (let i = 0; i < lines.length; i++) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'term-line typing';
                terminal.appendChild(lineDiv);
                lineDiv.style.opacity = 1;
                await new Promise(resolve => {
                    let j = 0; lineDiv.textContent = "";
                    const timer = setInterval(() => {
                        if (j < lines[i].length) { lineDiv.textContent += lines[i].charAt(j); j++; } 
                        else { clearInterval(timer); resolve(); }
                    }, 15);
                });
                lineDiv.classList.remove('typing'); lineDiv.style.borderRight = "none";
                await new Promise(r => setTimeout(r, 100));
            }
            setTimeout(() => { terminal.style.opacity = 0; setTimeout(() => terminal.style.display = 'none', 500); }, 300);
        }

        window.addEventListener('load', async () => {
            typeLines();
            initPhysics(); 
            initAI(); 
            await initLive2D(); 
        });

        // 2. PHYSICS ENGINE
        let world;
        function initPhysics() {
            const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner,
                  MouseConstraint = Matter.MouseConstraint, Mouse = Matter.Mouse, World = Matter.World, Bodies = Matter.Bodies;

            const engine = Engine.create(); world = engine.world; world.gravity.y = 1;

            const render = Render.create({
                element: document.getElementById('physics-canvas'), engine: engine,
                options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
            });
            Render.run(render); Runner.run(Runner.create(), engine);

            const wallOptions = { isStatic: true, render: { fillStyle: 'rgba(0,255,204,0.2)' } };
            World.add(world, [
                Bodies.rectangle(window.innerWidth/2, window.innerHeight + 25, window.innerWidth, 50, wallOptions),
                Bodies.rectangle(-25, window.innerHeight/2, 50, window.innerHeight, wallOptions),
                Bodies.rectangle(window.innerWidth + 25, window.innerHeight/2, 50, window.innerHeight, wallOptions)
            ]);

            for (let i = 0; i < 20; i++) {
                World.add(world, Bodies.rectangle(Math.random() * window.innerWidth, Math.random() * -500, Math.random() * 40 + 30, Math.random() * 40 + 30, 
                    { restitution: 0.9, render: { fillStyle: i % 2 === 0 ? '#00ffcc' : '#e94560' } }
                ));
            }

            const mouse = Mouse.create(document.body);
            const mouseConstraint = MouseConstraint.create(engine, { mouse: mouse, constraint: { stiffness: 0.2, render: { visible: false } } });
            World.add(world, mouseConstraint); render.mouse = mouse;

            window.addEventListener('resize', () => {
                render.canvas.width = window.innerWidth; render.canvas.height = window.innerHeight;
                Matter.Body.setPosition(world.bodies[0], { x: window.innerWidth / 2, y: window.innerHeight + 25 });
            });
        }

        // 3. THE BRUTE-FORCE PATH SCANNER (GOD MODE)
        window.currentLive2DModel = null;
        async function initLive2D() {
            const uiText = document.getElementById('ai-response');
            
            if (typeof PIXI === 'undefined' || !PIXI.live2d) {
                uiText.innerText = "Error: JS Libraries failed to load.";
                return;
            }

            const app = new PIXI.Application({
                view: document.getElementById('live2d-canvas'),
                autoStart: true, transparent: true, width: 400, height: 500
            });

            // YAHAN 6 ALAG ALAG RASTE HAIN. EK BHI CHALA TOH KAAM HO JAYEGA.
            const pathsToTry = [
                "shizuku/shizuku/shizuku.model.json",           // Local Deep
                "shizuku/shizuku.model.json",                   // Local Direct
                "/Surya.github.io/shizuku/shizuku.model.json",  // Local Absolute
                "../shizuku/shizuku.model.json",                // Local Relative
                "https://unpkg.com/live2d-widget-model-shizuku@1.0.5/assets/shizuku.model.json", // Global CDN 1
                "https://cdn.jsdelivr.net/npm/live2d-widget-model-shizuku@1.0.5/assets/shizuku.model.json" // Global CDN 2
            ];

            let loaded = false;

            for (let i = 0; i < pathsToTry.length; i++) {
                try {
                    uiText.innerText = `[SCANNING] Checking Path ${i + 1}...`;
                    console.log(`Trying Path ${i + 1}:`, pathsToTry[i]);
                    
                    const model = await PIXI.live2d.Live2DModel.from(pathsToTry[i]);
                    
                    app.stage.addChild(model);
                    model.scale.set(0.25); 
                    model.x = 20; 
                    model.y = 50;
                    
                    window.currentLive2DModel = model;
                    window.addEventListener('mousemove', (event) => { model.focus(event.clientX, event.clientY); });
                    
                    uiText.innerText = ""; // Clear text on success
                    loaded = true;
                    console.log(`SUCCESS! Loaded from Path ${i + 1}`);
                    break; // Stop scanning, model is loaded!
                } catch(e) {
                    console.warn(`Path ${i + 1} Failed.`);
                }
            }

            if (!loaded) {
                uiText.innerText = "Fatal Error: GitHub blocked all paths.";
            }
        }

        let isSpeaking = false;
        function startLipSync() {
            isSpeaking = true;
            if(window.currentLive2DModel && window.currentLive2DModel.motion) {
                try { window.currentLive2DModel.motion('tap_body'); } catch(e){}
            }
            simulateLipSync();
        }
        function stopLipSync() {
            isSpeaking = false;
            if(window.currentLive2DModel && window.currentLive2DModel.internalModel) {
                try { window.currentLive2DModel.internalModel.coreModel.setParamFloat('PARAM_MOUTH_OPEN_Y', 0); } catch(e){}
            }
        }
        function simulateLipSync() {
            if (!isSpeaking || !window.currentLive2DModel || !window.currentLive2DModel.internalModel) return;
            try { 
                window.currentLive2DModel.internalModel.coreModel.setParamFloat('PARAM_MOUTH_OPEN_Y', Math.random() > 0.4 ? Math.random() : 0); 
            } catch(e){}
            setTimeout(() => { requestAnimationFrame(simulateLipSync); }, 60); 
        }

        // 4. GROQ API + VOICE AI SYSTEM
        function initAI() {
            const lab_p1 = "gs"+"k_fDI4ghUMTl91vtQfC"; const lab_p2 = "3MWWGdyb3FYkktAtJlSX"; const lab_p3 = "bOLYWaKWIEnoAhY";
            const LAB_AI_KEY = lab_p1 + lab_p2 + lab_p3;
            const el_p1 = "sk_30c24e569c81d"; const el_p2 = "da0ef80bac0eeafbf67"; const el_p3 = "caf94b2b8059eeb0";
            const ELEVENLABS_API_KEY = el_p1 + el_p2 + el_p3;
            const VOICE_ID = "EXAVITQu4vr4xnSDxMaL";

            let labHistory = [{ role: "system", content: `You are Surya Labs AI, a highly intelligent FEMALE assistant created by Suryakant. [CRITICAL DIRECTIVE]: If user speaks English -> REPLY IN ENGLISH. If Hindi/Hinglish -> REPLY IN ROMAN HINGLISH using female grammar ("Main kar rahi hu"). Call him "Suryakant" or "Boss". No "Beta". Keep it under 2 sentences.` }];

            async function fetchDynamicAI(userQuestion) {
                labHistory.push({ role: "user", content: userQuestion });
                try {
                    const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                        method: "POST", headers: { "Authorization": `Bearer ${LAB_AI_KEY}`, "Content-Type": "application/json" },
                        body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: labHistory, temperature: 0.6, max_tokens: 100 })
                    });
                    const data = await response.json();
                    if (data.choices && data.choices.length > 0) {
                        const aiReply = data.choices[0].message.content;
                        labHistory.push({ role: "assistant", content: aiReply });
                        return aiReply;
                    } return "Brain disconnected.";
                } catch (error) { return "Network Error."; }
            }

            async function speak(text) {
                try {
                    const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}?optimize_streaming_latency=1`, {
                        method: 'POST', headers: { 'xi-api-key': ELEVENLABS_API_KEY, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: text, model_id: "eleven_multilingual_v2", voice_settings: { stability: 0.35, similarity_boost: 0.85 } })
                    });
                    if (response.ok) {
                        const audio = new Audio(URL.createObjectURL(await response.blob()));
                        startLipSync(); audio.onended = () => stopLipSync(); audio.play();
                    } else fallbackSpeak(text);
                } catch (error) { fallbackSpeak(text); }
            }

            function fallbackSpeak(text) {
                const synth = window.speechSynthesis; const utterance = new SpeechSynthesisUtterance(text);
                utterance.pitch = 1.2; utterance.rate = 1.0;  
                let bestVoice = synth.getVoices().find(v => v.name.includes("Google") || v.lang.includes("en-IN") || v.lang.includes("hi-IN"));
                if (bestVoice) utterance.voice = bestVoice;
                startLipSync(); utterance.onend = () => stopLipSync(); synth.speak(utterance);
            }

            const voiceBtn = document.getElementById('voice-btn');
            const aiResponseText = document.getElementById('ai-response');
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            
            if (SpeechRecognition) {
                const recognition = new SpeechRecognition();
                recognition.continuous = false; recognition.lang = 'en-IN'; 

                voiceBtn.addEventListener('click', () => {
                    recognition.start();
                    voiceBtn.classList.add('listening');
                    voiceBtn.innerHTML = '<i class="fas fa-satellite-dish"></i> Listening...';
                    aiResponseText.innerText = "Listening...";
                });

                recognition.onresult = async (event) => {
                    const userSpeech = event.results[0][0].transcript.toLowerCase();
                    voiceBtn.classList.remove('listening');
                    voiceBtn.innerHTML = '<i class="fas fa-microphone"></i> Activate AI';
                    aiResponseText.innerText = `You: "${userSpeech}"`;

                    if(userSpeech.includes("zero gravity") || userSpeech.includes("float")) {
                        if(world) { world.gravity.y = 0; world.bodies.forEach(b => !b.isStatic && Matter.Body.applyForce(b, b.position, {x: 0, y: -0.05})); }
                        let reply = "Zero gravity engaged.";
                        setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 1000); return;
                    } 
                    const reply = await fetchDynamicAI(userSpeech);
                    setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 500);
                };
                recognition.onerror = () => {
                    voiceBtn.classList.remove('listening'); voiceBtn.innerHTML = '<i class="fas fa-microphone"></i> Activate AI';
                    aiResponseText.innerText = "Error reading voice.";
                };
            }
        }
    </script>
</body>
</html>
