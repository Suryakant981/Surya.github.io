<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surya | Experimental Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050508; color: #00ffcc; font-family: 'Share Tech Mono', monospace; }

        /* TACTICAL TERMINAL BOOT-UP SEQUENCE */
        #terminal-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-start; text-shadow: 0 0 10px #00ffcc; font-size: 1.2rem; transition: opacity 1s ease-in-out; }
        .term-line { opacity: 0; margin-bottom: 10px; }
        .typing { border-right: 2px solid #00ffcc; animation: blink 0.8s infinite; white-space: nowrap; overflow: hidden; width: 0; }
        @keyframes blink { 50% { border-color: transparent; } }

        /* INTERACTIVE PHYSICS GRAVITY ENGINE */
        #physics-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .overlay-ui { position: absolute; z-index: 10; top: 30px; left: 30px; pointer-events: none; }
        .overlay-ui h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; margin: 0; color: #fff; text-shadow: 0 0 20px #8a2be2, 0 0 40px #8a2be2; }
        .overlay-ui p { color: #b3b3b3; font-size: 1.1rem; }

        #voice-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 20; background: #050508; border: 2px solid #00ffcc; color: #00ffcc; padding: 15px 40px; font-size: 1.2rem; font-family: 'Orbitron', sans-serif; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px; pointer-events: auto; }
        #voice-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 40px rgba(0, 255, 204, 0.8); }
        #voice-btn.listening { border-color: #ff0055; color: #ff0055; box-shadow: 0 0 40px rgba(255, 0, 85, 0.8); animation: pulse-btn 1.5s infinite; }
        @keyframes pulse-btn { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } 100% { transform: translateX(-50%) scale(1); } }

        #ai-response { position: absolute; bottom: 110px; width: 100%; text-align: center; font-size: 1.5rem; color: #fff; text-shadow: 0 0 15px #e94560; z-index: 20; font-family: 'Orbitron', sans-serif; pointer-events: none; padding: 0 20px; box-sizing: border-box; }
        
        .back-btn { position: absolute; top: 30px; right: 30px; z-index: 20; color: #00ffcc; text-decoration: none; font-family: 'Orbitron', sans-serif; border: 1px solid #00ffcc; padding: 10px 20px; border-radius: 5px; transition: 0.3s; background: rgba(0,0,0,0.5);}
        .back-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }

        /* =========================================
           FULL BODY ANIMATED CYBER-AVATAR
           ========================================= */
        #avatar-container {
            position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%);
            z-index: 15; width: 250px; height: 450px;
            display: flex; flex-direction: column; align-items: center;
            pointer-events: none; animation: float 4s ease-in-out infinite;
        }

        /* This wrapper flips the robot when walking left/right */
        .robot-flip-wrapper {
            display: flex; flex-direction: column; align-items: center; width: 100%;
        }

        /* Head Unit */
        .head {
            width: 70px; height: 85px; background: rgba(0,0,0,0.8);
            border: 2px solid #00ffcc; border-radius: 40% 40% 50% 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.3), inset 0 0 10px rgba(0, 255, 204, 0.2);
            margin-bottom: 5px; position: relative; z-index: 5;
        }
        .eyes-container { display: flex; gap: 15px; margin-bottom: 10px; }
        .eye { width: 18px; height: 6px; background: #00ffcc; border-radius: 2px; box-shadow: 0 0 10px #00ffcc; animation: blink-eye 5s infinite; }
        .mouth { width: 25px; height: 3px; background: #ff0055; border-radius: 10px; box-shadow: 0 0 15px #ff0055; transition: height 0.05s ease, border-radius 0.05s ease; }

        /* Torso */
        .neck { width: 20px; height: 10px; background: #222; border: 2px solid #333; border-radius: 5px;}
        .torso-container {
            width: 90px; height: 120px; background: linear-gradient(180deg, #111 0%, rgba(138,43,226,0.1) 50%, #000 100%);
            border: 2px solid #00ffcc; border-radius: 20px 20px 40px 40px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin-top: -5px; position: relative; z-index: 4;
            box-shadow: 0 0 20px rgba(138,43,226,0.3);
        }
        .core-reactor { width: 25px; height: 25px; background: radial-gradient(circle, #8a2be2 0%, transparent 70%); border: 2px solid #8a2be2; border-radius: 50%; box-shadow: 0 0 25px #8a2be2;}

        /* Arms */
        .arms-container { display: flex; width: 100%; justify-content: center; position: absolute; top: 105px; z-index: 3;}
        .arm { display: flex; flex-direction: column; align-items: center; width: 25px; transform-origin: top center; transition: transform 0.3s;}
        .arm-segment { width: 12px; background: #222; border: 2px solid #333; border-radius: 10px; margin-bottom: 2px;}
        .upper { height: 60px;} .lower { height: 50px;}
        .left-arm { transform: translateX(-55px);} .right-arm { transform: translateX(55px);}

        /* Legs */
        .waist-belt { width: 95px; height: 12px; background: #000; border: 2px solid #8a2be2; border-radius: 20px; margin-top: -5px; z-index: 4;}
        .legs-container { display: flex; gap: 20px; margin-top: -5px; }
        .leg { display: flex; flex-direction: column; align-items: center; transform-origin: top center; transition: transform 0.3s;}
        .leg-segment { width: 16px; background: #111; border: 2px solid #00ffcc; border-radius: 10px; margin-bottom: 2px; }
        .leg.upper { height: 70px;} .leg.lower { height: 60px;}
        .foot { width: 30px; height: 12px; background: #000; border: 2px solid #00ffcc; border-radius: 5px 5px 15px 15px; }

        .holo-base {
            margin-top: 15px; width: 240px; height: 25px; border-radius: 50%;
            border: 2px solid rgba(0, 255, 204, 0.4); background: radial-gradient(circle, rgba(0,255,204,0.2) 0%, transparent 70%);
            box-shadow: 0 0 30px #00ffcc; transform: rotateX(75deg); animation: base-pulse 2s infinite alternate;
        }

        /* =========================================
           ACTION ANIMATIONS (WALK, TALK-HANDS & DANCE)
           ========================================= */
        
        /* 1. Walk Across Screen Animations */
        @keyframes patrol-x { 
            0% { left: 15%; } 
            50% { left: 85%; } 
            100% { left: 15%; } 
        }
        @keyframes flip-dir { 
            0%, 49% { transform: scaleX(1); } 
            50%, 99% { transform: scaleX(-1); } /* Turn around */
            100% { transform: scaleX(1); } 
        }

        #avatar-container.walking { animation: walk-bounce 0.6s infinite alternate ease-in-out, patrol-x 12s infinite linear; }
        #avatar-container.walking .robot-flip-wrapper { animation: flip-dir 12s infinite linear; }
        #avatar-container.walking .left-arm { animation: swing-forward 0.6s infinite alternate ease-in-out; }
        #avatar-container.walking .right-arm { animation: swing-back 0.6s infinite alternate ease-in-out; }
        #avatar-container.walking .leg:nth-child(1) { animation: swing-back 0.6s infinite alternate ease-in-out; }
        #avatar-container.walking .leg:nth-child(2) { animation: swing-forward 0.6s infinite alternate ease-in-out; }

        /* 2. Talking Hand Gestures (When standing still and talking) */
        @keyframes talk-gesture-right { 0% { transform: translateX(55px) rotate(0deg); } 100% { transform: translateX(55px) rotate(-35deg); } }
        @keyframes talk-gesture-left { 0% { transform: translateX(-55px) rotate(0deg); } 100% { transform: translateX(-55px) rotate(25deg); } }
        
        #avatar-container.speaking:not(.walking):not(.dancing) .right-arm { animation: talk-gesture-right 1s infinite alternate ease-in-out; }
        #avatar-container.speaking:not(.walking):not(.dancing) .left-arm { animation: talk-gesture-left 1.2s infinite alternate ease-in-out; }

        /* 3. Dance Animation */
        #avatar-container.dancing { animation: dance-bounce 0.4s infinite alternate ease-in-out; }
        #avatar-container.dancing .head { animation: head-bob 0.4s infinite alternate ease-in-out; }
        #avatar-container.dancing .left-arm { animation: dance-arm-left 0.4s infinite alternate ease-in-out; }
        #avatar-container.dancing .right-arm { animation: dance-arm-right 0.4s infinite alternate ease-in-out; }
        #avatar-container.dancing .leg:nth-child(1) { animation: dance-leg 0.4s infinite alternate ease-in-out; }
        #avatar-container.dancing .leg:nth-child(2) { animation: dance-leg-reverse 0.4s infinite alternate ease-in-out; }

        /* Keyframes for Actions */
        @keyframes blink-eye { 0%, 95%, 98%, 100% { height: 6px; transform: scaleY(1); } 96%, 99% { height: 2px; transform: scaleY(0.1); } }
        @keyframes float { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-15px); } }
        @keyframes base-pulse { 0% { transform: rotateX(75deg) scale(0.9); opacity: 0.5; } 100% { transform: rotateX(75deg) scale(1.1); opacity: 1; } }
        
        @keyframes walk-bounce { 0% { transform: translateX(-50%) translateY(0); } 100% { transform: translateX(-50%) translateY(-10px); } }
        @keyframes swing-forward { 0% { transform: translateX(-55px) rotate(35deg); } 100% { transform: translateX(-55px) rotate(-35deg); } }
        @keyframes swing-back { 0% { transform: translateX(55px) rotate(-35deg); } 100% { transform: translateX(55px) rotate(35deg); } }
        
        @keyframes dance-bounce { 0% { transform: translateX(-50%) translateY(0) scale(1); } 100% { transform: translateX(-50%) translateY(-20px) scale(1.05); } }
        @keyframes head-bob { 0% { transform: rotate(-10deg); } 100% { transform: rotate(10deg); } }
        @keyframes dance-arm-left { 0% { transform: translateX(-55px) rotate(120deg); } 100% { transform: translateX(-55px) rotate(160deg); } }
        @keyframes dance-arm-right { 0% { transform: translateX(55px) rotate(-120deg); } 100% { transform: translateX(55px) rotate(-160deg); } }
        @keyframes dance-leg { 0% { transform: translateY(0); } 100% { transform: translateY(-10px) rotate(15deg); } }
        @keyframes dance-leg-reverse { 0% { transform: translateY(-10px) rotate(-15deg); } 100% { transform: translateY(0); } }

        /* Lip Sync Effects */
        #avatar-container.speaking .holo-base { border-color: #ff0055; box-shadow: 0 0 40px #ff0055; }
        #avatar-container.speaking .core-reactor { box-shadow: 0 0 35px #ff0055; border-color: #ff0055; }
    </style>
</head>
<body>

    <div id="terminal-screen"></div>

    <div class="overlay-ui">
        <h1>SURYA LABS</h1>
        <p>Gravity Engine Active. Voice Commands: "Walk", "Dance", "Stop".</p>
    </div>
    
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Exit Lab</a>

    <div id="avatar-container">
        <div class="robot-flip-wrapper">
            <div class="head">
                <div class="eyes-container"><div class="eye"></div><div class="eye"></div></div>
                <div class="mouth" id="cyber-mouth"></div>
            </div>
            <div class="neck"></div>
            <div class="torso-container"><div class="core-reactor"></div></div>
            <div class="arms-container">
                <div class="arm left-arm"><div class="arm-segment upper"></div><div class="arm-segment lower"></div></div>
                <div class="arm right-arm"><div class="arm-segment upper"></div><div class="arm-segment lower"></div></div>
            </div>
            <div class="waist-belt"></div>
            <div class="legs-container">
                <div class="leg"><div class="leg-segment upper"></div><div class="leg-segment lower"></div><div class="foot"></div></div>
                <div class="leg"><div class="leg-segment upper"></div><div class="leg-segment lower"></div><div class="foot"></div></div>
            </div>
        </div>
        <div class="holo-base"></div>
    </div>

    <div id="ai-response"></div>
    <button id="voice-btn"><i class="fas fa-microphone"></i> Activate AI</button>

    <div id="physics-canvas"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <script>
        /* =========================================
           TACTICAL BOOT-UP SCRIPT
           ========================================= */
        const terminal = document.getElementById('terminal-screen');
        const lines = [
            "Initiating SENTINEL-X protocols...",
            "Loading Kinetic Animation Rig & Space Patrol... [OK]",
            "Booting Matter.js Physics Engine... [OK]",
            "System is fully operational."
        ];

        async function typeLines() {
            for (let i = 0; i < lines.length; i++) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'term-line typing';
                terminal.appendChild(lineDiv);
                lineDiv.style.opacity = 1;
                await new Promise(resolve => {
                    let j = 0; lineDiv.textContent = "";
                    const timer = setInterval(() => {
                        if (j < lines[i].length) { lineDiv.textContent += lines[i].charAt(j); j++; } 
                        else { clearInterval(timer); resolve(); }
                    }, 30);
                });
                lineDiv.classList.remove('typing'); lineDiv.style.borderRight = "none";
                await new Promise(r => setTimeout(r, 200));
            }
            setTimeout(() => { terminal.style.opacity = 0; setTimeout(() => terminal.style.display = 'none', 1000); }, 500);
        }
        window.onload = typeLines;

        /* =========================================
           INTERACTIVE PHYSICS ENGINE
           ========================================= */
        const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner,
              MouseConstraint = Matter.MouseConstraint, Mouse = Matter.Mouse, World = Matter.World, Bodies = Matter.Bodies;
        const engine = Engine.create(); const world = engine.world; world.gravity.y = 1;

        const render = Render.create({
            element: document.getElementById('physics-canvas'), engine: engine,
            options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
        });
        Render.run(render); Runner.run(Runner.create(), engine);

        const wallOptions = { isStatic: true, render: { fillStyle: 'rgba(0, 255, 204, 0.2)' } };
        World.add(world, [
            Bodies.rectangle(window.innerWidth/2, window.innerHeight + 25, window.innerWidth, 50, wallOptions),
            Bodies.rectangle(-25, window.innerHeight/2, 50, window.innerHeight, wallOptions),
            Bodies.rectangle(window.innerWidth + 25, window.innerHeight/2, 50, window.innerHeight, wallOptions)
        ]);

        for (let i = 0; i < 20; i++) {
            World.add(world, Bodies.rectangle(Math.random() * window.innerWidth, Math.random() * -500, Math.random() * 40 + 30, Math.random() * 40 + 30, 
                { restitution: 0.9, render: { fillStyle: i % 2 === 0 ? '#00ffcc' : '#e94560' } }
            ));
        }

        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, { mouse: mouse, constraint: { stiffness: 0.2, render: { visible: false } } });
        World.add(world, mouseConstraint); render.mouse = mouse;

        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth; render.canvas.height = window.innerHeight;
            Matter.Body.setPosition(world.bodies[0], { x: window.innerWidth / 2, y: window.innerHeight + 25 });
        });

        /* =========================================
           LIP SYNC LOGIC
           ========================================= */
        let isSpeaking = false;
        const cyberMouth = document.getElementById('cyber-mouth');
        const avatarContainer = document.getElementById('avatar-container');

        function startLipSync() {
            isSpeaking = true; avatarContainer.classList.add('speaking'); simulateLipSync();
        }
        function stopLipSync() {
            isSpeaking = false; avatarContainer.classList.remove('speaking');
            if(cyberMouth) { cyberMouth.style.height = '3px'; cyberMouth.style.borderRadius = '10px'; }
        }
        function simulateLipSync() {
            if (!isSpeaking) return;
            const isOpen = Math.random() > 0.4;
            if (isOpen && cyberMouth) {
                cyberMouth.style.height = `${Math.floor(Math.random() * 15) + 5}px`;
                cyberMouth.style.borderRadius = '50%'; 
            } else if (cyberMouth) {
                cyberMouth.style.height = '3px'; cyberMouth.style.borderRadius = '10px';
            }
            setTimeout(() => { requestAnimationFrame(simulateLipSync); }, 80); 
        }

        /* =========================================
           API LOGIC (GROQ + ELEVENLABS)
           ========================================= */
        const LAB_AI_KEY = "gs"+"k_fDI4ghUMTl91vtQfC" + "3MWWGdyb3FYkktAtJlSX" + "bOLYWaKWIEnoAhY";
        let labHistory = [{ role: "system", content: `You are Surya Labs AI. Keep answers under 2 sentences. Reply in Hinglish if asked in Hindi/Hinglish.` }];

        async function fetchDynamicAI(userQuestion) {
            labHistory.push({ role: "user", content: userQuestion });
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST", headers: { "Authorization": `Bearer ${LAB_AI_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: labHistory, temperature: 0.6, max_tokens: 100 })
                });
                const data = await response.json();
                if (data.choices && data.choices.length > 0) {
                    const aiReply = data.choices[0].message.content; labHistory.push({ role: "assistant", content: aiReply }); return aiReply;
                } else return "Brain disconnected.";
            } catch (error) { return "Network Error."; }
        }

        const ELEVENLABS_API_KEY = "sk_30c24e569c81d" + "da0ef80bac0eeafbf67" + "caf94b2b8059eeb0";
        const VOICE_ID = "EXAVITQu4vr4xnSDxMaL"; 

        async function speak(text) {
            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}?optimize_streaming_latency=1`, {
                    method: 'POST', headers: { 'xi-api-key': ELEVENLABS_API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, model_id: "eleven_multilingual_v2", voice_settings: { stability: 0.35, similarity_boost: 0.85 } })
                });
                if (response.ok) {
                    const audio = new Audio(URL.createObjectURL(await response.blob()));
                    audio.onplay = () => startLipSync(); audio.onended = () => stopLipSync(); audio.play();
                } else {
                    const errData = await response.json();
                    console.error("ElevenLabs Error:", errData);
                    alert("⚠️ ElevenLabs Error: Tera Free Quota khatam ho gaya hai! Naya API Key daal code me. Tab tak sasti voice chalegi.");
                    fallbackSpeak(text);
                }
            } catch (error) { 
                fallbackSpeak(text); 
            }
        }
        
        function fallbackSpeak(text) {
            const synth = window.speechSynthesis; const utterance = new SpeechSynthesisUtterance(text);
            utterance.onstart = () => startLipSync(); utterance.onend = () => stopLipSync(); synth.speak(utterance);
        }

        /* =========================================
           VOICE COMMANDS (WALK, DANCE, STOP)
           ========================================= */
        const voiceBtn = document.getElementById('voice-btn');
        const aiResponseText = document.getElementById('ai-response');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false; recognition.lang = 'en-IN'; 

            voiceBtn.addEventListener('click', () => {
                recognition.start(); voiceBtn.classList.add('listening');
                voiceBtn.innerHTML = '<i class="fas fa-satellite-dish"></i> Listening...';
                aiResponseText.innerText = "Listening...";
            });

            recognition.onresult = async (event) => {
                const userSpeech = event.results[0][0].transcript.toLowerCase();
                voiceBtn.classList.remove('listening'); voiceBtn.innerHTML = '<i class="fas fa-microphone"></i> Activate AI';
                aiResponseText.innerText = `You: "${userSpeech}"`;

                // ANIMATION COMMANDS
                if(userSpeech.includes("walk") || userSpeech.includes("run")) {
                    avatarContainer.classList.remove('dancing');
                    avatarContainer.classList.add('walking');
                    let reply = "I am scanning the perimeter now.";
                    setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 500); return;
                } 
                else if(userSpeech.includes("dance")) {
                    avatarContainer.classList.remove('walking');
                    avatarContainer.classList.add('dancing');
                    let reply = "Let's dance!";
                    setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 500); return;
                }
                else if(userSpeech.includes("stop")) {
                    avatarContainer.classList.remove('walking', 'dancing');
                    let reply = "Stopping all movement routines.";
                    setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 500); return;
                }
                
                // GRAVITY COMMANDS
                if(userSpeech.includes("zero gravity")) {
                    world.gravity.y = 0; world.bodies.forEach(b => !b.isStatic && Matter.Body.applyForce(b, b.position, {x: 0, y: -0.05}));
                    let reply = "Zero gravity engaged.";
                    setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 500); return;
                } else if(userSpeech.includes("normal gravity")) {
                    world.gravity.y = 1; let reply = "Normal gravity restored.";
                    setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 500); return;
                }

                // NORMAL CHAT
                const reply = await fetchDynamicAI(userSpeech);
                setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 500);
            };

            recognition.onerror = () => {
                voiceBtn.classList.remove('listening'); voiceBtn.innerHTML = '<i class="fas fa-microphone"></i> Activate AI';
                aiResponseText.innerText = "Error reading voice.";
            };
        }
    </script>
</body>
</html>
