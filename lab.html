<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surya | Experimental Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050508; color: #00ffcc; font-family: 'Share Tech Mono', monospace; }

        /* =========================================
           FREQUENCY SHATTER SPLASH SCREEN
           ========================================= */
        #lab-splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 9999999;
            background: #020204; display: flex; flex-direction: column; justify-content: center; align-items: center;
            font-family: 'Orbitron', sans-serif; overflow: hidden;
            transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.8, 0, 0.2, 1);
        }

        .wave-container { display: flex; align-items: center; gap: 8px; margin-bottom: 30px; height: 100px; }
        .wave-bar { width: 12px; background: #00ffcc; border-radius: 10px; box-shadow: 0 0 15px #00ffcc; animation: wave-pulse 1s ease-in-out infinite alternate; }
        .wave-bar:nth-child(1) { height: 20px; animation-delay: 0.1s; }
        .wave-bar:nth-child(2) { height: 50px; animation-delay: 0.3s; }
        .wave-bar:nth-child(3) { height: 80px; animation-delay: 0.5s; }
        .wave-bar:nth-child(4) { height: 40px; animation-delay: 0.2s; }
        .wave-bar:nth-child(5) { height: 60px; animation-delay: 0.4s; }

        .splash-text { font-size: 1.5rem; letter-spacing: 5px; color: #fff; text-shadow: 0 0 10px #00ffcc; }
        
        .shatter-flash {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff;
            opacity: 0; z-index: 10; pointer-events: none;
        }

        @keyframes wave-pulse { 0% { transform: scaleY(0.5); } 100% { transform: scaleY(1.5); } }
        
        .overload .wave-bar { background: #ff0055; box-shadow: 0 0 30px #ff0055; animation: wave-overload 0.1s infinite !important; }
        .overload .splash-text { color: #ff0055; text-shadow: 0 0 20px #ff0055; animation: shake 0.2s infinite; }
        
        @keyframes wave-overload { 0% { transform: scaleY(0.2) scaleX(1); } 100% { transform: scaleY(3) scaleX(1.5); } }
        @keyframes shake { 0%, 100% { transform: translate(0, 0); } 25% { transform: translate(-5px, 5px); } 50% { transform: translate(5px, -5px); } }
        @keyframes flash-bang { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }

        /* =========================================
           INTERACTIVE PHYSICS GRAVITY ENGINE
           ========================================= */
        #physics-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        .overlay-ui { position: absolute; z-index: 10; top: 30px; left: 30px; pointer-events: none; }
        .overlay-ui h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; margin: 0; color: #fff; text-shadow: 0 0 20px #8a2be2, 0 0 40px #8a2be2; }
        .overlay-ui p { color: #b3b3b3; font-size: 1.1rem; text-shadow: 0 0 5px #000; }

        .back-btn { position: absolute; top: 30px; right: 30px; z-index: 20; color: #00ffcc; text-decoration: none; font-family: 'Orbitron', sans-serif; border: 1px solid #00ffcc; padding: 10px 20px; border-radius: 5px; transition: 0.3s; background: rgba(0,0,0,0.5); }
        .back-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }

        /* =========================================
           HOLOGRAPHIC ANIME AI GIRL AVATAR
           ========================================= */
        #hologram-wrapper {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            width: 180px; height: 220px; z-index: 15;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            animation: float-avatar 4s ease-in-out infinite; pointer-events: none;
        }

        .holo-base {
            position: absolute; bottom: 0; width: 140px; height: 30px; border-radius: 50%;
            border: 2px solid rgba(0, 255, 204, 0.8); background: radial-gradient(circle, rgba(0,255,204,0.4) 0%, transparent 70%);
            box-shadow: 0 0 20px #00ffcc, inset 0 0 20px #00ffcc; transform: rotateX(70deg);
            animation: base-pulse 2s infinite alternate; z-index: 1;
        }
        .holo-beam {
            position: absolute; bottom: 15px; width: 100px; height: 180px;
            background: linear-gradient(to top, rgba(0,255,204,0.3) 0%, transparent 100%);
            clip-path: polygon(20% 0, 80% 0, 100% 100%, 0% 100%);
            z-index: 2; opacity: 0.6;
        }

        .anime-avatar {
            position: relative; z-index: 3; width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(0, 255, 204, 0.8)); opacity: 0.9;
            transition: all 0.3s ease;
        }

        #hologram-wrapper.listening .holo-base { border-color: #ff0055; box-shadow: 0 0 30px #ff0055, inset 0 0 30px #ff0055; background: radial-gradient(circle, rgba(255,0,85,0.4) 0%, transparent 70%); }
        #hologram-wrapper.listening .holo-beam { background: linear-gradient(to top, rgba(255,0,85,0.3) 0%, transparent 100%); }
        #hologram-wrapper.listening .anime-avatar { filter: drop-shadow(0 0 25px rgba(255, 0, 85, 0.9)); transform: scale(1.05); }

        #hologram-wrapper.speaking .holo-base { border-color: #00ffcc; box-shadow: 0 0 40px #00ffcc, inset 0 0 40px #00ffcc; animation: rapid-pulse 0.3s infinite alternate;}
        #hologram-wrapper.speaking .holo-beam { background: linear-gradient(to top, rgba(0,255,204,0.6) 0%, transparent 100%); animation: flash-beam 0.3s infinite alternate;}
        #hologram-wrapper.speaking .anime-avatar { filter: drop-shadow(0 0 30px rgba(0, 255, 204, 1)) brightness(1.2); animation: talk-bounce 0.4s infinite alternate; }

        @keyframes float-avatar { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-15px); } }
        @keyframes base-pulse { 0% { transform: rotateX(70deg) scale(0.9); } 100% { transform: rotateX(70deg) scale(1.1); } }
        @keyframes rapid-pulse { 0% { transform: rotateX(70deg) scale(1); opacity: 0.7;} 100% { transform: rotateX(70deg) scale(1.15); opacity: 1;} }
        @keyframes talk-bounce { 0% { transform: translateY(0) scale(1.02); } 100% { transform: translateY(-5px) scale(1); } }

        /* =========================================
           LIVE WEB-BASED VOICE AI BUTTON
           ========================================= */
        #voice-btn { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 20; background: rgba(0,0,0,0.6); border: 2px solid #00ffcc; color: #00ffcc; padding: 15px 40px; font-size: 1.2rem; font-family: 'Orbitron', sans-serif; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px; pointer-events: auto; backdrop-filter: blur(5px);}
        #voice-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 40px rgba(0, 255, 204, 0.8); }
        #voice-btn.listening { border-color: #ff0055; color: #ff0055; box-shadow: 0 0 40px rgba(255, 0, 85, 0.8); animation: btn-pulse 1.5s infinite; }
        @keyframes btn-pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } 100% { transform: translateX(-50%) scale(1); } }

        #ai-response { position: absolute; bottom: 340px; width: 100%; text-align: center; font-size: 1.5rem; color: #fff; text-shadow: 0 0 15px #e94560; z-index: 20; font-family: 'Orbitron', sans-serif; pointer-events: none; padding: 0 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="lab-splash">
        <div class="wave-container">
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
            <div class="wave-bar"></div>
        </div>
        <div class="splash-text" id="splash-text">CALIBRATING AUDIO...</div>
        <div class="shatter-flash" id="shatter-flash"></div>
    </div>

    <div class="overlay-ui">
        <h1>SURYA LABS</h1>
        <p>Gravity Engine Active. Drag and drop the glowing blocks.</p>
    </div>
    
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Exit Lab</a>

    <div id="ai-response"></div>

    <div id="hologram-wrapper">
        <img src="Ai.png" alt="AI Avatar" class="anime-avatar" onerror="this.src='https://cdn.pixabay.com/photo/2023/05/29/18/43/ai-generated-8026857_1280.png'">
        <div class="holo-beam"></div>
        <div class="holo-base"></div>
    </div>

    <button id="voice-btn"><i class="fas fa-microphone"></i> Activate AI</button>

    <div id="physics-canvas"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <script>
        window.addEventListener('load', () => {
            const splash = document.getElementById('lab-splash');
            const text = document.getElementById('splash-text');
            const flash = document.getElementById('shatter-flash');
            
            setTimeout(() => { text.innerText = "SYNCING NEURAL NET..."; }, 1000);
            
            setTimeout(() => {
                splash.classList.add('overload');
                text.innerText = "WARNING: OVERLOAD DETECTED!";
                
                setTimeout(() => {
                    flash.style.animation = "flash-bang 0.8s ease-out forwards";
                    
                    setTimeout(() => {
                        splash.style.opacity = '0';
                        splash.style.transform = 'scale(1.5)';
                        setTimeout(() => splash.style.display = 'none', 500);
                    }, 200); 
                }, 1200); 
            }, 2500);
        });

        /* =========================================
           INTERACTIVE PHYSICS GRAVITY ENGINE
           ========================================= */
        const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner,
              MouseConstraint = Matter.MouseConstraint, Mouse = Matter.Mouse, World = Matter.World, Bodies = Matter.Bodies;

        const engine = Engine.create();
        const world = engine.world;
        world.gravity.y = 1;

        const render = Render.create({
            element: document.getElementById('physics-canvas'), engine: engine,
            options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
        });
        Render.run(render); Runner.run(Runner.create(), engine);

        const wallOptions = { isStatic: true, render: { fillStyle: 'rgba(0, 255, 204, 0.2)' } };
        World.add(world, [
            Bodies.rectangle(window.innerWidth/2, window.innerHeight + 25, window.innerWidth, 50, wallOptions),
            Bodies.rectangle(-25, window.innerHeight/2, 50, window.innerHeight, wallOptions),
            Bodies.rectangle(window.innerWidth + 25, window.innerHeight/2, 50, window.innerHeight, wallOptions)
        ]);

        for (let i = 0; i < 20; i++) {
            let box = Bodies.rectangle(Math.random() * window.innerWidth, Math.random() * -500, Math.random() * 40 + 30, Math.random() * 40 + 30, 
                { restitution: 0.9, render: { fillStyle: i % 2 === 0 ? '#00ffcc' : '#e94560', strokeStyle: '#ffffff', lineWidth: 2 } }
            );
            World.add(world, box);
        }

        const mouse = Mouse.create(render.canvas);
        const mouseConstraint = MouseConstraint.create(engine, { mouse: mouse, constraint: { stiffness: 0.2, render: { visible: false } } });
        World.add(world, mouseConstraint); render.mouse = mouse;

        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth; render.canvas.height = window.innerHeight;
            Matter.Body.setPosition(world.bodies[0], { x: window.innerWidth / 2, y: window.innerHeight + 25 });
        });

        /* =========================================
           1. GROQ API (FEMALE AI PROMPT FIX)
           ========================================= */
        const lab_p1 = "gs"+"k_fDI4ghUMTl91vtQfC"; 
        const lab_p2 = "3MWWGdyb3FYkktAtJlSX";
        const lab_p3 = "bOLYWaKWIEnoAhY";
        const LAB_AI_KEY = lab_p1 + lab_p2 + lab_p3;

       // YAHAN MAINE AI KO STRICT INSTRUCTION DI HAI KI WO LADKI HAI!
       let labHistory = [
            { 
                role: "system", 
                content: `You are Surya Labs AI, a highly intelligent FEMALE anime assistant created by Suryakant. 
                
                [CRITICAL DIRECTIVE: STRICT GENDER & LANGUAGE MIRRORING]
                1. YOU ARE FEMALE. When speaking in Hindi or Roman Hinglish, YOU MUST USE FEMININE GRAMMAR (e.g., "Main theek hoon", "Main kar rahi hoon", "Main bataati hoon"). NEVER use masculine terms like "raha hoon" or "karta hoon".
                2. If the user speaks in English -> REPLY IN PURE ENGLISH.
                3. If the user speaks in Hindi/Hinglish -> REPLY IN ROMAN HINGLISH using female grammar.
                
                Keep answers extremely short (1-2 sentences), sharp, and cute/playful.` 
            }
        ];

        async function fetchDynamicAI(userQuestion) {
            labHistory.push({ role: "user", content: userQuestion });
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${LAB_AI_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: labHistory, temperature: 0.6, max_tokens: 100 })
                });

                const data = await response.json();
                if (data.choices && data.choices.length > 0) {
                    const aiReply = data.choices[0].message.content;
                    labHistory.push({ role: "assistant", content: aiReply });
                    return aiReply;
                } else {
                    return "System Offline: Brain disconnected.";
                }
            } catch (error) {
                return "Network Error. Connection dropped.";
            }
        }

        /* =========================================
           2. ELEVENLABS NATURAL VOICE
           ========================================= */
        const el_p1 = "sk_30c24e569c81d"; 
        const el_p2 = "da0ef80bac0eeafbf67";
        const el_p3 = "caf94b2b8059eeb0";
        const ELEVENLABS_API_KEY = el_p1 + el_p2 + el_p3;
        const VOICE_ID = "EXAVITQu4vr4xnSDxMaL"; // Bella Voice ID
        
        const hologram = document.getElementById('hologram-wrapper');

       async function speak(text) {
            if (ELEVENLABS_API_KEY.includes("YOUR_ELEVEN_KEY")) {
                fallbackSpeak(text); return;
            }
            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}?optimize_streaming_latency=1`, {
                    method: 'POST',
                    headers: { 'xi-api-key': ELEVENLABS_API_KEY, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text, model_id: "eleven_multilingual_v2", 
                        voice_settings: { stability: 0.35, similarity_boost: 0.85 }
                    })
                });

                if (response.ok) {
                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    
                    hologram.classList.add('speaking');
                    audio.play();
                    audio.onended = () => { hologram.classList.remove('speaking'); };
                    
                } else {
                    fallbackSpeak(text);
                }
            } catch (error) {
                fallbackSpeak(text);
            }
        }
        
        function fallbackSpeak(text) {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 1.2; 
            utterance.rate = 1.0;  
            let voices = synth.getVoices();
            let bestVoice = voices.find(v => v.name.includes("Google") || v.lang.includes("en-IN") || v.lang.includes("hi-IN"));
            if (bestVoice) utterance.voice = bestVoice;
            
            hologram.classList.add('speaking');
            utterance.onend = () => { hologram.classList.remove('speaking'); };
            synth.speak(utterance);
        }
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        /* =========================================
           3. LIVE WEB-BASED VOICE AI
           ========================================= */
        const voiceBtn = document.getElementById('voice-btn');
        const aiResponseText = document.getElementById('ai-response');
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-IN'; 

            voiceBtn.addEventListener('click', () => {
                recognition.start();
                voiceBtn.classList.add('listening');
                hologram.classList.add('listening'); 
                voiceBtn.innerHTML = '<i class="fas fa-satellite-dish"></i> Listening...';
                aiResponseText.innerText = "Listening...";
            });

            recognition.onresult = async (event) => {
                const userSpeech = event.results[0][0].transcript.toLowerCase();
                voiceBtn.classList.remove('listening');
                hologram.classList.remove('listening'); 
                voiceBtn.innerHTML = '<i class="fas fa-microphone"></i> Activate AI';
                
                aiResponseText.innerText = `You: "${userSpeech}"`;

                if(userSpeech.includes("zero gravity") || userSpeech.includes("float")) {
                    world.gravity.y = 0;
                    world.bodies.forEach(b => !b.isStatic && Matter.Body.applyForce(b, b.position, {x: 0, y: -0.05}));
                    let reply = "Zero gravity engaged. Main hawa mein tair rahi hoon!";
                    setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 1000);
                    return;
                } 
                else if(userSpeech.includes("normal gravity") || userSpeech.includes("restore gravity") || userSpeech.includes("wapas aao")) {
                    world.gravity.y = 1;
                    let reply = "Gravity restored back to normal.";
                    setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 1000);
                    return;
                }

                const reply = await fetchDynamicAI(userSpeech);
                setTimeout(() => {
                    aiResponseText.innerText = `AI: "${reply}"`;
                    speak(reply);
                }, 500);
            };

            recognition.onerror = () => {
                voiceBtn.classList.remove('listening');
                hologram.classList.remove('listening');
                voiceBtn.innerHTML = '<i class="fas fa-microphone"></i> Activate AI';
                aiResponseText.innerText = "Error reading voice. Check permissions.";
            };
        } else {
            voiceBtn.style.display = 'none';
            aiResponseText.innerText = "Voice API is not supported in this browser.";
        }
    </script>
</body>
</html>
