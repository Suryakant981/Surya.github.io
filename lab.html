<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surya | Experimental Lab</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050508; color: #00ffcc; font-family: 'Share Tech Mono', monospace; }

        /* TACTICAL TERMINAL BOOT-UP SEQUENCE */
        #terminal-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; padding: 40px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-start; text-shadow: 0 0 10px #00ffcc; font-size: 1.2rem; transition: opacity 1s ease-in-out; }
        .term-line { opacity: 0; margin-bottom: 10px; }
        .typing { border-right: 2px solid #00ffcc; animation: blink 0.8s infinite; white-space: nowrap; overflow: hidden; width: 0; }
        @keyframes blink { 50% { border-color: transparent; } }

        /* INTERACTIVE PHYSICS GRAVITY ENGINE */
        #physics-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        .overlay-ui { position: absolute; z-index: 10; top: 30px; left: 30px; pointer-events: none; }
        .overlay-ui h1 { font-family: 'Orbitron', sans-serif; font-size: 3rem; margin: 0; color: #fff; text-shadow: 0 0 20px #8a2be2, 0 0 40px #8a2be2; }
        .overlay-ui p { color: #b3b3b3; font-size: 1.1rem; }

        /* PURE CSS CYBER-AVATAR (NO FILES NEEDED) */
        #avatar-container {
            position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%);
            z-index: 15; display: flex; flex-direction: column; align-items: center;
            pointer-events: none;
        }

        .cyber-face {
            width: 140px; height: 160px;
            background: radial-gradient(circle, rgba(0,255,204,0.1) 0%, rgba(0,0,0,0.8) 100%);
            border: 2px solid #00ffcc;
            border-radius: 40% 40% 50% 50%;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.4), inset 0 0 20px rgba(0, 255, 204, 0.2);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            animation: float 4s ease-in-out infinite;
            position: relative;
        }

        .cyber-face::before { content: ''; position: absolute; top: -10px; width: 60px; height: 5px; background: #00ffcc; border-radius: 5px; box-shadow: 0 0 10px #00ffcc; }
        .cyber-face::after { content: ''; position: absolute; bottom: -5px; width: 30px; height: 5px; background: #ff0055; border-radius: 5px; box-shadow: 0 0 10px #ff0055; }

        .eyes-container { display: flex; gap: 35px; margin-bottom: 25px; margin-top: 10px;}
        .eye { width: 35px; height: 12px; background: #00ffcc; border-radius: 10px; box-shadow: 0 0 15px #00ffcc; animation: blink-eye 4s infinite; }
        
        .mouth { width: 45px; height: 4px; background: #00ffcc; border-radius: 10px; box-shadow: 0 0 15px #00ffcc; transition: height 0.05s ease, border-radius 0.05s ease; }

        .holo-base {
            margin-top: 20px; width: 180px; height: 20px; border-radius: 50%;
            border: 1px solid rgba(0, 255, 204, 0.5); background: radial-gradient(circle, rgba(0,255,204,0.3) 0%, transparent 70%);
            box-shadow: 0 0 20px #00ffcc; transform: rotateX(75deg); animation: base-pulse 2s infinite alternate;
        }

        @keyframes blink-eye { 0%, 95%, 98%, 100% { height: 12px; transform: scaleY(1); } 96%, 99% { height: 2px; transform: scaleY(0.1); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); box-shadow: 0 0 50px rgba(0, 255, 204, 0.6), inset 0 0 30px rgba(0, 255, 204, 0.3); } }
        @keyframes base-pulse { 0% { transform: rotateX(75deg) scale(0.9); opacity: 0.5; } 100% { transform: rotateX(75deg) scale(1.1); opacity: 1; } }

        /* LIVE WEB-BASED VOICE AI BUTTON */
        #voice-btn { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 20; background: #050508; border: 2px solid #00ffcc; color: #00ffcc; padding: 15px 40px; font-size: 1.2rem; font-family: 'Orbitron', sans-serif; font-weight: bold; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 2px; pointer-events: auto; }
        #voice-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 40px rgba(0, 255, 204, 0.8); }
        #voice-btn.listening { border-color: #ff0055; color: #ff0055; box-shadow: 0 0 40px rgba(255, 0, 85, 0.8); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } 100% { transform: translateX(-50%) scale(1); } }

        #ai-response { position: absolute; bottom: 110px; width: 100%; text-align: center; font-size: 1.5rem; color: #fff; text-shadow: 0 0 15px #e94560; z-index: 20; font-family: 'Orbitron', sans-serif; pointer-events: none; padding: 0 20px; box-sizing: border-box; }
        
        /* Back to Portfolio Button */
        .back-btn { position: absolute; top: 30px; right: 30px; z-index: 20; color: #00ffcc; text-decoration: none; font-family: 'Orbitron', sans-serif; border: 1px solid #00ffcc; padding: 10px 20px; border-radius: 5px; transition: 0.3s; }
        .back-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }
    </style>
</head>
<body>

    <div id="terminal-screen"></div>

    <div class="overlay-ui">
        <h1>SURYA LABS</h1>
        <p>Gravity Engine Active. Drag and drop the glowing blocks.</p>
    </div>
    
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Exit Lab</a>

    <div id="avatar-container">
        <div class="cyber-face">
            <div class="eyes-container">
                <div class="eye left-eye"></div>
                <div class="eye right-eye"></div>
            </div>
            <div class="mouth" id="cyber-mouth"></div>
        </div>
        <div class="holo-base"></div>
    </div>

    <div id="ai-response"></div>
    <button id="voice-btn"><i class="fas fa-microphone"></i> Activate AI</button>

    <div id="physics-canvas"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    
    <script>
        /* =========================================
           TACTICAL BOOT-UP SCRIPT
           ========================================= */
        const terminal = document.getElementById('terminal-screen');
        const lines = [
            "Initiating SENTINEL-X secure protocols...",
            "Loading Cyber-Avatar Matrix... [OK]",
            "Booting Matter.js 2D Physics Engine... [OK]",
            "Initializing Web Speech API Voice Recognition... [OK]",
            "Establishing Secure Uplink to ElevenLabs & Llama-3.1... [OK]",
            "Welcome back, Suryakant. System is fully operational."
        ];

        async function typeLines() {
            for (let i = 0; i < lines.length; i++) {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'term-line typing';
                terminal.appendChild(lineDiv);
                lineDiv.style.opacity = 1;
                await typeText(lineDiv, lines[i], 30);
                lineDiv.classList.remove('typing');
                lineDiv.style.borderRight = "none";
                await new Promise(r => setTimeout(r, 400));
            }
            setTimeout(() => {
                terminal.style.opacity = 0;
                setTimeout(() => terminal.style.display = 'none', 1000);
            }, 1000);
        }

        function typeText(element, text, speed) {
            return new Promise(resolve => {
                let i = 0;
                element.style.width = 'auto';
                element.textContent = "";
                const timer = setInterval(() => {
                    if (i < text.length) {
                        element.textContent += text.charAt(i); i++;
                    } else {
                        clearInterval(timer); resolve();
                    }
                }, speed);
            });
        }
        window.onload = typeLines;

        /* =========================================
           INTERACTIVE PHYSICS GRAVITY ENGINE
           ========================================= */
        const Engine = Matter.Engine, Render = Matter.Render, Runner = Matter.Runner,
              MouseConstraint = Matter.MouseConstraint, Mouse = Matter.Mouse, World = Matter.World, Bodies = Matter.Bodies;

        const engine = Engine.create();
        const world = engine.world;
        world.gravity.y = 1;

        const render = Render.create({
            element: document.getElementById('physics-canvas'), engine: engine,
            options: { width: window.innerWidth, height: window.innerHeight, wireframes: false, background: 'transparent' }
        });
        Render.run(render); Runner.run(Runner.create(), engine);

        const wallOptions = { isStatic: true, render: { fillStyle: 'rgba(0, 255, 204, 0.2)' } };
        World.add(world, [
            Bodies.rectangle(window.innerWidth/2, window.innerHeight + 25, window.innerWidth, 50, wallOptions),
            Bodies.rectangle(-25, window.innerHeight/2, 50, window.innerHeight, wallOptions),
            Bodies.rectangle(window.innerWidth + 25, window.innerHeight/2, 50, window.innerHeight, wallOptions)
        ]);

        for (let i = 0; i < 20; i++) {
            let box = Bodies.rectangle(Math.random() * window.innerWidth, Math.random() * -500, Math.random() * 40 + 30, Math.random() * 40 + 30, 
                { restitution: 0.9, render: { fillStyle: i % 2 === 0 ? '#00ffcc' : '#e94560', strokeStyle: '#ffffff', lineWidth: 2 } }
            );
            World.add(world, box);
        }

        // Bind mouse to document body so it works everywhere
        const mouse = Mouse.create(document.body);
        const mouseConstraint = MouseConstraint.create(engine, { mouse: mouse, constraint: { stiffness: 0.2, render: { visible: false } } });
        World.add(world, mouseConstraint); render.mouse = mouse;

        window.addEventListener('resize', () => {
            render.canvas.width = window.innerWidth; render.canvas.height = window.innerHeight;
            Matter.Body.setPosition(world.bodies[0], { x: window.innerWidth / 2, y: window.innerHeight + 25 });
        });

        /* =========================================
           AVATAR LIP SYNC ENGINE
           ========================================= */
        let isSpeaking = false;
        const cyberMouth = document.getElementById('cyber-mouth');

        function startLipSync() {
            isSpeaking = true;
            simulateLipSync();
        }
        
        function stopLipSync() {
            isSpeaking = false;
            if(cyberMouth) {
                cyberMouth.style.height = '4px';
                cyberMouth.style.borderRadius = '10px';
            }
        }

        function simulateLipSync() {
            if (!isSpeaking) return;
            const isOpen = Math.random() > 0.4;
            if (isOpen && cyberMouth) {
                const height = Math.floor(Math.random() * 20) + 10; 
                cyberMouth.style.height = `${height}px`;
                cyberMouth.style.borderRadius = '50%'; 
            } else if (cyberMouth) {
                cyberMouth.style.height = '4px';
                cyberMouth.style.borderRadius = '10px';
            }
            setTimeout(() => { requestAnimationFrame(simulateLipSync); }, 80); 
        }

        /* =========================================
           1. GROQ API (BILINGUAL LLAMA-3.1 BRAIN)
           ========================================= */
        const lab_p1 = "gs"+"k_fDI4ghUMTl91vtQfC"; 
        const lab_p2 = "3MWWGdyb3FYkktAtJlSX";
        const lab_p3 = "bOLYWaKWIEnoAhY";
        const LAB_AI_KEY = lab_p1 + lab_p2 + lab_p3;

       let labHistory = [
            { 
                role: "system", 
                content: `You are Surya Labs AI, a highly intelligent assistant created by Suryakant (a BCA Student). 
                
                [CRITICAL DIRECTIVE: STRICT LANGUAGE MIRRORING]
                You must dynamically detect the language of the user's input and match it 100%.
                
                CONDITION A: If the user speaks in pure English:
                -> YOU MUST REPLY IN 100% PURE, PROFESSIONAL ENGLISH. NO HINDI. NO HINGLISH.
                
                CONDITION B: If the user speaks in Hindi or Roman Hinglish:
                -> YOU MUST REPLY IN FULL NATURAL LIKE HUMAN BEING TALKS ROMAN HINGLISH.
                
                Keep your answers extremely short (1-2 sentences), sharp, and scientific.` 
            }
        ];

        async function fetchDynamicAI(userQuestion) {
            labHistory.push({ role: "user", content: userQuestion });
            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${LAB_AI_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: labHistory,
                        temperature: 0.6,
                        max_tokens: 100 
                    })
                });

                const data = await response.json();
                if (data.choices && data.choices.length > 0) {
                    const aiReply = data.choices[0].message.content;
                    labHistory.push({ role: "assistant", content: aiReply });
                    return aiReply;
                } else {
                    return "System Offline: Brain disconnected.";
                }
            } catch (error) {
                return "Network Error. Connection dropped.";
            }
        }

        /* =========================================
           2. ELEVENLABS NATURAL VOICE (MULTILINGUAL)
           ========================================= */
        const el_p1 = "sk_30c24e569c81d"; 
        const el_p2 = "da0ef80bac0eeafbf67";
        const el_p3 = "caf94b2b8059eeb0";
        const ELEVENLABS_API_KEY = el_p1 + el_p2 + el_p3;
        const VOICE_ID = "EXAVITQu4vr4xnSDxMaL"; 

       async function speak(text) {
            if (ELEVENLABS_API_KEY.includes("YOUR_ELEVEN_KEY")) {
                console.error("API Key nahi daali bhai!");
                fallbackSpeak(text);
                return;
            }

            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}?optimize_streaming_latency=1`, {
                    method: 'POST',
                    headers: {
                        'xi-api-key': ELEVENLABS_API_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: text,
                        model_id: "eleven_multilingual_v2", 
                        voice_settings: { stability: 0.35, similarity_boost: 0.85 }
                    })
                });

                if (response.ok) {
                    const audioBlob = await response.blob();
                    const audioUrl = URL.createObjectURL(audioBlob);
                    const audio = new Audio(audioUrl);
                    
                    audio.onplay = () => { startLipSync(); };
                    audio.onended = () => { stopLipSync(); };
                    
                    audio.play();
                } else {
                    const errData = await response.json();
                    console.error("🚨 ElevenLabs Error:", errData);
                    fallbackSpeak(text);
                }
            } catch (error) {
                console.error("🚨 Network Error:", error);
                fallbackSpeak(text);
            }
        }
        
        function fallbackSpeak(text) {
            const synth = window.speechSynthesis;
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.pitch = 1.0; 
            utterance.rate = 1.0;  
            let voices = synth.getVoices();
            let bestVoice = voices.find(v => v.name.includes("Google") || v.lang.includes("en-IN") || v.lang.includes("hi-IN"));
            if (bestVoice) utterance.voice = bestVoice;
            
            utterance.onstart = () => { startLipSync(); };
            utterance.onend = () => { stopLipSync(); };
            
            synth.speak(utterance);
        }

        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

        /* =========================================
           3. LIVE WEB-BASED VOICE AI (SPEECH RECOGNITION)
           ========================================= */
        const voiceBtn = document.getElementById('voice-btn');
        const aiResponseText = document.getElementById('ai-response');
        
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.lang = 'en-IN'; 

            voiceBtn.addEventListener('click', () => {
                recognition.start();
                voiceBtn.classList.add('listening');
                voiceBtn.innerHTML = '<i class="fas fa-satellite-dish"></i> Listening...';
                aiResponseText.innerText = "Listening...";
            });

            recognition.onresult = async (event) => {
                const userSpeech = event.results[0][0].transcript.toLowerCase();
                voiceBtn.classList.remove('listening');
                voiceBtn.innerHTML = '<i class="fas fa-microphone"></i> Activate AI';
                
                aiResponseText.innerText = `You: "${userSpeech}"`;

                if(userSpeech.includes("zero gravity") || userSpeech.includes("float")) {
                    world.gravity.y = 0;
                    world.bodies.forEach(b => !b.isStatic && Matter.Body.applyForce(b, b.position, {x: 0, y: -0.05}));
                    let reply = "Zero gravity engaged. Physics engine altered.";
                    setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 1000);
                    return;
                } 
                else if(userSpeech.includes("normal gravity") || userSpeech.includes("restore gravity")) {
                    world.gravity.y = 1;
                    let reply = "Normal gravity restored.";
                    setTimeout(() => { aiResponseText.innerText = `AI: "${reply}"`; speak(reply); }, 1000);
                    return;
                }

                const reply = await fetchDynamicAI(userSpeech);
                
                setTimeout(() => {
                    aiResponseText.innerText = `AI: "${reply}"`;
                    speak(reply);
                }, 500);
            };

            recognition.onerror = () => {
                voiceBtn.classList.remove('listening');
                voiceBtn.innerHTML = '<i class="fas fa-microphone"></i> Activate AI';
                aiResponseText.innerText = "Error reading voice. Check permissions.";
            };
        } else {
            voiceBtn.style.display = 'none';
            aiResponseText.innerText = "Voice API is not supported in this browser.";
        }
    </script>
</body>
</html>
