<style>
    /* 1. Animation Logic */
    @keyframes borderGlow {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; margin: 0; }

    /* 2. Hero Section (Updated Size & Photo) */
    .hero-container {
        display: flex;
        align-items: center;
        justify-content: space-around;
        padding: 50px 10%;
        background: #1a1a2e; /* Dark theme matching your screen */
        color: white;
        flex-wrap: wrap-reverse;
    }

    .hero-content { max-width: 600px; }

    .hero-content p {
        font-size: 1rem; /* Size decreased */
        line-height: 1.6;
        color: #d1d1d1;
    }

    .read-more-btn {
        color: #ff416c;
        cursor: pointer;
        font-weight: bold;
        text-decoration: none;
    }

    /* Round Profile Photo Logic */
    .profile-wrapper {
        position: relative;
        width: 180px;
        height: 180px;
    }

    .profile-img {
        width: 100%;
        height: 100%;
        border-radius: 50%; /* Round photo */
        object-fit: cover;
        border: 3px solid #ff416c;
        transition: all 0.4s ease;
        cursor: pointer;
    }

    /* Hover: Arrow le jane par pop-out look */
    .profile-img:hover {
        transform: scale(1.1);
        box-shadow: 0 0 20px rgba(255, 65, 108, 0.6);
    }

    /* 3. Projects Grid Design */
    .projects-grid {
        display: flex;
        flex-wrap: wrap;
        gap: 25px;
        justify-content: center;
        padding: 40px 20px;
    }

    .project-card {
        background: #ffffff;
        border-radius: 15px;
        width: 300px;
        padding: 30px 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.06);
        position: relative;
        overflow: hidden;
        border: 1px solid #eee;
        display: flex;
        flex-direction: column;
        transition: transform 0.3s ease;
    }

    .project-card::before {
        content: "";
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 6px; 
        background: linear-gradient(90deg, #ff4b2b, #ff416c, #6c63ff, #00d2ff);
        background-size: 300% 300%;
        animation: borderGlow 4s linear infinite;
    }

    .project-card:hover { transform: translateY(-10px); }
    .icon-box { font-size: 40px; color: #d63384; margin-bottom: 20px; }
    .project-card h3 { font-size: 1.25rem; color: #333; margin-bottom: 12px; }
    .project-card p { font-size: 0.9rem; color: #666; height: 80px; overflow: hidden; }

    .tech-tags span {
        font-size: 0.75rem; background: #f1f2f6; padding: 4px 10px;
        border-radius: 5px; color: #d63384; font-weight: bold; margin: 2px;
    }

    .btn-view {
        display: block; background: #d63384; color: white;
        text-decoration: none; padding: 12px; border-radius: 8px;
        font-weight: bold; margin-top: auto;
    }
</style>
